      // ── History tracking ─────────────────────────────────────────
      var STORAGE_KEY = 'agent-studio-history';
      var MAX_HISTORY_ENTRIES = 50;
      var MAX_MSGS_PER_CONV = 200;
      var historyCount = 0;
      var currentHistoryId = null;
      var historyData = {};
      var historyEmpty = document.getElementById('historyEmpty');
      var historyList = document.getElementById('historyList');
      var historyItemsWrap = document.createElement('div');
      historyItemsWrap.id = 'historyItemsWrap';
      historyList.appendChild(historyItemsWrap);

      function saveHistory() {
        try {
          var ids = Object.keys(historyData);
          if (ids.length > MAX_HISTORY_ENTRIES) {
            ids.sort(function (a, b) {
              var na = parseInt(a.replace('hist-', '')) || 0;
              var nb = parseInt(b.replace('hist-', '')) || 0;
              return na - nb;
            });
            for (var i = 0; i < ids.length - MAX_HISTORY_ENTRIES; i++) {
              delete historyData[ids[i]];
              var el = historyItemsWrap.querySelector('.history-item[data-id="' + ids[i] + '"]');
              if (el) el.remove();
            }
            updateHistoryEmpty();
          }
          var data = { count: historyCount, entries: historyData };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        } catch (_) {}
      }

      function loadHistoryFromStorage() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) { updateHistoryEmpty(); return; }
          var data = JSON.parse(raw);
          historyCount = data.count || 0;
          historyData = data.entries || {};
          var ids = Object.keys(historyData);
          if (ids.length === 0) { updateHistoryEmpty(); return; }
          ids.sort(function (a, b) {
            var na = parseInt(a.replace('hist-', '')) || 0;
            var nb = parseInt(b.replace('hist-', '')) || 0;
            return na - nb;
          });
          if (ids.length > MAX_HISTORY_ENTRIES) {
            for (var i = 0; i < ids.length - MAX_HISTORY_ENTRIES; i++) {
              delete historyData[ids[i]];
            }
            saveHistory();
            ids = ids.slice(ids.length - MAX_HISTORY_ENTRIES);
          }
          var labelDiv = document.createElement('div');
          labelDiv.className = 'history-group-label';
          labelDiv.textContent = '今天';
          historyItemsWrap.appendChild(labelDiv);
          for (var i = 0; i < ids.length; i++) {
            var entry = historyData[ids[i]];
            renderHistoryItem(ids[i], entry.message, entry.time);
          }
          updateHistoryEmpty();
        } catch (_) { historyCount = 0; historyData = {}; updateHistoryEmpty(); }
      }

      function updateHistoryEmpty() {
        var items = historyItemsWrap.querySelectorAll('.history-item');
        if (items.length === 0) {
          historyEmpty.style.display = 'flex';
          while (historyItemsWrap.firstChild) { historyItemsWrap.removeChild(historyItemsWrap.firstChild); }
        } else { historyEmpty.style.display = 'none'; }
      }

      function renderHistoryItem(id, message, ts) {
        var shortMsg = message.length > 30 ? message.substring(0, 30) + '…' : message;
        var timeStr = ts ? formatHistoryTime(ts) : '';
        var item = document.createElement('div');
        item.className = 'history-item';
        item.dataset.id = id;
        item.title = message;
        item.innerHTML =
          '<div class="h-icon"><svg viewBox="0 0 13 13" fill="none"><rect x="1.5" y="2" width="10" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M4 5.5h5M4 7.5h3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg></div>' +
          '<span class="title">' + escapeHtml(shortMsg) + '</span>' +
          '<div class="actions"><button class="btn-delete-hist" title="删除"><svg viewBox="0 0 13 13" fill="none"><path d="M2 3.5h9M5 3.5V2.5a1 1 0 011-1h1a1 1 0 011 1v1M4 5v5.5M6.5 5v5.5M9 5v5.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>' +
          (timeStr ? '<div class="h-time">' + timeStr + '</div>' : '');
        item.addEventListener('click', function (e) { if (e.target.closest('.actions')) return; loadHistory(this); });
        historyItemsWrap.appendChild(item);
        return item;
      }

      function formatHistoryTime(ts) {
        var d = new Date(ts), now = new Date();
        var h = String(d.getHours()).padStart(2, '0'), m = String(d.getMinutes()).padStart(2, '0');
        if (d.toDateString() === now.toDateString()) return '今天 ' + h + ':' + m;
        var y = new Date(now); y.setDate(y.getDate() - 1);
        if (d.toDateString() === y.toDateString()) return '昨天 ' + h + ':' + m;
        return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + h + ':' + m;
      }

      function addHistoryEntry(message) {
        if (!historyItemsWrap.querySelector('.history-group-label')) {
          var labelDiv = document.createElement('div');

        currentHistoryId = id;
        var now = Date.now();
        historyData[id] = { message: message, time: now, messages: conversationMessages.slice() };
        renderHistoryItem(id, message, now);
        updateHistoryEmpty();
        saveHistory();
      }

      historyItemsWrap.addEventListener('click', function (e) {
        var btn = e.target.closest('.btn-delete-hist');
        if (!btn) return;
        e.stopPropagation();
        var item = btn.closest('.history-item');
        if (!item) return;
        var id = item.dataset.id;
        delete historyData[id];
        item.remove();
        var prev = item.previousElementSibling;
        if (prev && prev.classList.contains('history-group-label')) {
          var next = item.nextElementSibling;
          if (!next || next.classList.contains('history-group-label')) prev.remove();

        saveHistory();

      function loadHistory(el) {

        reapplyAllContentFolds();

        el.classList.add('active');
      }

      // ── Markdown 渲染 ────────────────────────────────────────────
      function renderMarkdown(text) {
        if (!text) return '';
        if (typeof marked === 'undefined') return htmlEscape(text).replace(/\n/g, '<br>');
        try {
          marked.setOptions({ breaks: true, gfm: true });
          var html = marked.parse(text);
          return html;
        } catch (e) {
          return htmlEscape(text).replace(/\n/g, '<br>');
        }
      }

      // 将渲染后的内容注入到气泡 p 元素中
      function renderIntoBubble(bubbleEl, content, isUser) {
        var existingContent = bubbleEl.querySelector('.md-content');
        var existingP = bubbleEl.querySelector('p');
        
        if (isUser) {
          // 用户消息保持纯文本
          var p = existingP || document.createElement('p');
          p.textContent = content;
          if (!existingP) bubbleEl.appendChild(p);
          return;
        }

        // AI 消息: 检测是否包含 Markdown 语法
        var hasMd = /^#{1,4}\s|```|[*_]{1,2}|^\s*[-*+]\s|^\s*\d+\.\s|\[.*\]\(.*\)|^\s*>\s|^\s*\|/m.test(content);

        if (hasMd || content.length > 200) {
          // 使用 Markdown 渲染
          if (existingContent) existingContent.remove();
          if (existingP) existingP.remove();

          var mdDiv = document.createElement('div');
          mdDiv.className = 'md-content';
          mdDiv.innerHTML = renderMarkdown(content);
          bubbleEl.appendChild(mdDiv);
        } else {
          // 短文本无 Markdown 特征，使用纯文本
          if (existingContent) existingContent.remove();
          var p = existingP || document.createElement('p');
          p.textContent = content;
          if (!existingP) bubbleEl.appendChild(p);
        }
      }

      loadHistoryFromStorage();

      // ── 思考链渲染 ──
      var NODE_LABELS = { decompose: '分解', reason: '推理', tools: '工具', validate: '校验', fix: '修复', summary: '总结' };
      var NODE_ORDER = ['decompose', 'reason', 'tools', 'validate', 'fix', 'summary'];
      var thinkRevealTimers = {}; // 每个 responseRow 的流式展开定时器

      var thinkQueue = [];
      var thinkQueueTimer = null;
      var _currentThinkRow = null;
      var _thinkingFinished = false;

      function processThinkQueue() {
        if (thinkQueue.length === 0) {
          thinkQueueTimer = null;
          // 队列全部渲染完毕，自动折叠
          if (_currentThinkRow && _thinkingFinished) {
            finishThinkSection(_currentThinkRow);
          }
          return;
        }
        var item = thinkQueue.shift();
        addThinkNode(item.row, item.type, item.text);
        scrollToBottom();
        thinkQueueTimer = setTimeout(processThinkQueue, 400);
      }

      function enqueueThinkNode(row, type, text) {
        _currentThinkRow = row;
        thinkQueue.push({ row: row, type: type, text: text });
        if (!thinkQueueTimer) processThinkQueue();
      }

      function ensureThinkSection(responseRow) {
        var existing = responseRow.querySelector('.think-section');
        if (existing) return existing;
        var bubble = responseRow.querySelector('.silk-bubble');
        if (!bubble) return null;
        var sec = document.createElement('div');
        sec.className = 'think-section';
        sec.innerHTML = '<div class="fold-section">' +
          '<div class="fold-section-header" onclick="this.parentElement.classList.toggle(\'user-fold\')">' +
            '<svg class="fold-chevron" viewBox="0 0 14 14" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>' +
            '<svg class="fold-icon" viewBox="0 0 14 14" fill="none"><path d="M7 1.5a6 6 0 001.5.5M7 1.5A6 6 0 015.5 2M7 1.5V4m5 3.5a6 6 0 00-.5 1.5M12.5 7A6 6 0 0112 5.5M12.5 7h-2.5M7 12.5a6 6 0 01-1.5-.5M7 12.5V10M1.5 7a6 6 0 01.5-1.5M1.5 7h2.5M5.5 12A6 6 0 017 12.5m1.5-.5A6 6 0 0010 10" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>' +
            '<span>思考过程</span>' +
            '<span class="fold-status"></span>' +
          '</div>' +
          '<div class="fold-section-body"><div class="think-pipeline"></div></div>' +
        '</div>';
        var mdContent = bubble.querySelector('.md-content');
        if (mdContent) {
          bubble.insertBefore(sec, mdContent);
        } else {
          bubble.appendChild(sec);
        }
        return sec;
      }

      function addThinkNode(responseRow, type, text) {
        var sec = ensureThinkSection(responseRow);
        var pipeline = sec.querySelector('.think-pipeline');
        if (!pipeline) return;
        var oldActive = pipeline.querySelector('.think-node.active');
        if (oldActive) { oldActive.classList.remove('active'); oldActive.classList.add('done'); }
        var existingNode = pipeline.querySelector('.think-node.' + type);
        if (existingNode) {
          setTimeout(function () {
            existingNode.classList.remove('done', 'pending');
            existingNode.classList.add('active');
            updateFoldStatus(sec);
          }, 200);
          var body = existingNode.querySelector('.think-node-body');
          if (body) body.textContent = text;
        } else {
          var connector = pipeline.children.length > 0 ? '<div class="think-connector"></div>' : '';
          var label = NODE_LABELS[type] || type;
          var node = document.createElement('div');
          node.className = 'think-node ' + type + ' active';
          node.innerHTML = connector + '<span class="think-node-badge">' + label + '</span><span class="think-node-body">' + escapeHtml(text) + '</span>';
          pipeline.appendChild(node);
        }
        updateFoldStatus(sec);
        scrollToBottom();
      }

      function updateFoldStatus(thinkSection) {
        var pipeline = thinkSection.querySelector('.think-pipeline');
        if (!pipeline) return;
        var total = pipeline.querySelectorAll('.think-node').length;
        var done = pipeline.querySelectorAll('.think-node.done').length;
        var active = pipeline.querySelector('.think-node.active');
        var badge = thinkSection.querySelector('.fold-status');
        if (!badge) return;
        if (active) {
          var activeLabel = active.querySelector('.think-node-badge');
          badge.textContent = (activeLabel ? activeLabel.textContent.replace(/[✓\s]/g, '') : '') + '中…';
          badge.className = 'fold-status running';
        } else if (done >= total && total > 0) {
          badge.textContent = '已完成';
          badge.className = 'fold-status done';
        } else {
          badge.textContent = '';
          badge.className = 'fold-status';
        }
      }

      // 流式逐个展开 6 个阶段（全量已知时使用）
      function streamRevealThinkNodes(responseRow, stages) {
        var sec = ensureThinkSection(responseRow);
        var pipeline = sec.querySelector('.think-pipeline');
        if (!pipeline) return;
        // 清除之前的定时器
        var rowId = responseRow.dataset.rowId || ('row-' + Date.now());
        responseRow.dataset.rowId = rowId;
        if (thinkRevealTimers[rowId]) {
          thinkRevealTimers[rowId].forEach(function (t) { clearTimeout(t); });
        }
        // 先创建所有节点，全部可见（pending 态，灰色）
        stages.forEach(function (tn, idx) {
          var connector = idx > 0 ? '<div class="think-connector"></div>' : '';
          var label = NODE_LABELS[tn.type] || tn.type;
          var node = document.createElement('div');
          node.className = 'think-node ' + tn.type + ' pending';
          node.dataset.stageType = tn.type;
          node.innerHTML = connector + '<span class="think-node-badge">' + label + '</span><span class="think-node-body">' + escapeHtml(tn.text) + '</span>';
          pipeline.appendChild(node);
        });
        // 第一个立即激活
        if (stages.length > 0) {
          var first = pipeline.querySelector('.think-node.' + stages[0].type);
          if (first) { first.classList.remove('pending'); first.classList.add('active'); }
        }
        // 逐一流式切换：active → done + 下一个 → active
        var timers = [];
        if (stages.length > 1) {
          stages.forEach(function (tn, idx) {
            if (idx === 0) return; // 跳过第一个（已激活）
            var t = setTimeout(function () {
              // 前一个 active → done
              var prevActive = pipeline.querySelector('.think-node.active');
              if (prevActive) { prevActive.classList.remove('active'); prevActive.classList.add('done'); }
              // 当前 pending → active
              var cur = pipeline.querySelector('.think-node.' + tn.type);
              if (cur) { cur.classList.remove('pending'); cur.classList.add('active'); }
              updateFoldStatus(sec);
              scrollToBottom();
            }, idx * 300);
            timers.push(t);
          });
        }
        thinkRevealTimers[rowId] = timers;
      }

      function finishThinkSection(responseRow) {
        var sec = responseRow.querySelector('.think-section');
        if (!sec) return;
        // 清除流式展开定时器
        var rowId = responseRow.dataset.rowId;
        if (rowId && thinkRevealTimers[rowId]) {
          thinkRevealTimers[rowId].forEach(function (t) { clearTimeout(t); });
          delete thinkRevealTimers[rowId];
        }
        var foldSection = sec.querySelector('.fold-section');
        if (foldSection) foldSection.classList.add('user-fold');
        var pipeline = sec.querySelector('.think-pipeline');
        if (pipeline) {
          var nodes = pipeline.querySelectorAll('.think-node');
          nodes.forEach(function (n) {
            n.classList.remove('active', 'pending');
            n.classList.add('done');
          });
          updateFoldStatus(sec);
        }
      }

            '<svg class="fold-chevron" viewBox="0 0 14 14" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>' +

          sourceBody.appendChild(row);

        var sourceCount = sourceBody.querySelectorAll('a').length;
        var sourceLabel = sourceWrap.querySelector('.fold-section-header span');
        if (sourceLabel) sourceLabel.textContent = '搜索资源 (' + sourceCount + ')';

        // ── 首次批次的搜索摘要 2.5s 后自动折叠 ──
        if (isFirstBatch && summaryWrap) {
          var _sumEl = summaryWrap;
          setTimeout(function () {

              _sumEl.classList.add('user-fold');

      // =========================================================================
      // CONTENT FOLD — 正文内容折叠
      // 处理联网搜索等场景下的大篇幅文本，默认折叠，用户可手动展开
      // =========================================================================

      /** 判断内容是否需要折叠（>500 字符 或 >15 行） */
      function shouldFoldContent(content) {
        if (!content) return false;
        var lines = content.split('\n');
        return content.length > 500 || lines.length > 15;
      }

      /** 从完整内容提取前 N 行作为折叠预览摘要 */
      function generateContentPreview(content) {
        if (!content) return '';
        var plain = content
          .replace(/```[\s\S]*?```/g, '[代码块]')
          .replace(/`[^`]+`/g, '')
          .replace(/#{1,6}\s+/g, '')
          .replace(/\*\*([^*]+)\*\*/g, '$1')
          .replace(/\*([^*]+)\*/g, '$1')
          .replace(/\[([^\]]+)\]\([^\)]+\)/g, '$1')
          .replace(/^\s*[-*+]\s+/gm, '')
          .replace(/^\s*\d+\.\s+/gm, '')
          .replace(/\n{2,}/g, '\n')
          .trim();
        var lines = plain.split('\n').filter(function (l) { return l.trim(); });
        var preview = lines.slice(0, 3).join(' · ');
        if (lines.length > 3) preview += ' …';
        return preview.length > 150 ? preview.slice(0, 147) + '…' : preview;
      }

      /** 为机器人回复气泡应用折叠（仅当内容超出阈值时） */
      function applyContentFold(responseRow, rawContent) {
        // 用户要求：正文大段内容直接全部展示，不再做展开全文折叠
        return;
      }

      /** 重新应用页面中所有机器人消息的折叠 */
      function reapplyAllContentFolds() {
        var rows = document.querySelectorAll('#chatBody .silk-bubble-row.bot');
        rows.forEach(function (row) {
          var bubble = row.querySelector('.silk-bubble');
          if (!bubble) return;
          // 已有折叠容器的跳过
          if (bubble.querySelector('.content-fold-container')) return;
          var mdContent = bubble.querySelector('.md-content');
          if (!mdContent) return;
          var raw = mdContent.textContent || '';
          applyContentFold(row, raw);
        });
      }

      async function sendMessage() {
        var message = chatInput.value.trim();
        if (!message && !pendingFiles.length) return;
        chatInput.value = '';
        chatInput.style.height = 'auto';

        btnSend.classList.add('loading');

        // 读取待上传文件内容
        var fileContents = await readFilesContents();
        // 将文件名拼入消息
        if (fileContents.length > 0) {
          var fileList = fileContents.map(function (f) { return f.name; }).join('、');
          if (message) {
            message = '【上传文件：' + fileList + '】\n' + message;
          } else {
            message = '请分析我上传的文件：' + fileList;
          }
        }

        addMessage(message, true);
        addTypingIndicator();
        addHistoryEntry(message);

        // 发送后清空文件列表
        pendingFiles = [];
        renderFileTags();

        try {
          var body = { message: message, session_id: getSessionId() };
          if (fileContents.length > 0) {
            body.files = fileContents;
          }
          var response = await fetch(API_BASE_URL + '/chat/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          if (!response.ok) throw new Error('请求失败');
          var reader = response.body.getReader();
          var decoder = new TextDecoder('utf-8');
          var botResponse = '';
          var responseElement = null;
          var bufferedSources = null;   // 缓冲搜索来源
          _thinkingFinished = false; // 思考链是否已结束
          var _rafPending = false;      // requestAnimationFrame 是否已排期
          var _mdEl = null;             // 缓存的 md-content 元素引用

          function flushMarkdown() {
            _rafPending = false;
            if (_mdEl) _mdEl.innerHTML = renderMarkdown(botResponse);
            scrollToBottom();
          }

          function ensureResponseElement() {
            if (responseElement) return;
            removeTypingIndicator();
            responseElement = document.createElement('div');
            responseElement.className = 'silk-bubble-row bot';
            responseElement.innerHTML = '<div class="silk-avatar"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="10" rx="2" stroke="currentColor" stroke-width="1.2"/><circle cx="6" cy="7.5" r="1.2" fill="currentColor"/><circle cx="10" cy="7.5" r="1.2" fill="currentColor"/><path d="M6 10.5c.6.5 1.3.8 2 .8s1.4-.3 2-.8" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/><path d="M5 3V2a1 1 0 011-1h4a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg></div><div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:0"><div class="silk-bubble"><div class="md-content"></div></div><div class="message-time">' + new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) + '</div></div>';
            document.getElementById('chatBody').appendChild(responseElement);
          }

          while (true) {
            var result = await reader.read();
            if (result.done) break;
            var chunk = decoder.decode(result.value);
            var lines = chunk.split('\n').filter(function (l) { return l.trim(); });
            for (var i = 0; i < lines.length; i++) {
              var line = lines[i];
              try {
                var data = JSON.parse(line);
                if (data.done) break;

                // ── 思考链事件（逐节点队列渲染） ──
                if (data.thinking) {
                  ensureResponseElement();
                  data.thinking.forEach(function (tn) {
                    enqueueThinkNode(responseElement, tn.type, tn.text);
                  });
                  continue;
                }

                // ── 思考链结束 ──
                if (data.thinking_end) {
                  _thinkingFinished = true;
                  continue;
                }

                // ── 搜索源头 ──
                if (data.sources) {
                  if (responseElement) {
                    // tokens 已到达，直接渲染搜索资源
                    renderSearchSources(responseElement, data.sources);
                  } else {
                    // tokens 还没到，缓冲等待
                    bufferedSources = data.sources;
                  }
                  continue;
                }

                // ── 普通 token ──
                if (data.token) {
                  botResponse += data.token;
                  ensureResponseElement();
                  // 首次 token 时，渲染缓冲的搜索来源
                  if (botResponse.length <= data.token.length) {
                    if (bufferedSources) {
                      renderSearchSources(responseElement, bufferedSources);
                      bufferedSources = null;
                    }
                  }
                  if (!_mdEl) _mdEl = responseElement.querySelector('.silk-bubble .md-content');
                  if (!_rafPending) {
                    _rafPending = true;
                    requestAnimationFrame(flushMarkdown);
                  }
                }
              } catch (e) { console.error('解析响应失败:', e); }
            }
          }
          removeTypingIndicator();
          if (botResponse) {
            if (!responseElement) addMessage(botResponse, false);
            else {
              // 流式结束，取消 pending RAF 并做最后一次同步渲染
              if (_rafPending) { _rafPending = false; }
              if (_mdEl) _mdEl.innerHTML = renderMarkdown(botResponse);
              var actionsWrapEl = document.createElement('div');
              actionsWrapEl.className = 'message-actions visible';
              var copyBtn = document.createElement('button');
              copyBtn.className = 'copy-btn';
              copyBtn.title = '复制';
              copyBtn.innerHTML = '<svg viewBox="0 0 14 14" fill="none"><rect x="3" y="3" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M11 3v8a1 1 0 01-1 1H3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>';
              (function (content, btn) {
                btn.addEventListener('click', function (e) {
                  e.stopPropagation();
                  navigator.clipboard.writeText(content).then(function () {
                    btn.classList.add('copied');
                    btn.innerHTML = '<svg viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5L12 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
                    setTimeout(function () { btn.classList.remove('copied'); btn.innerHTML = '<svg viewBox="0 0 14 14" fill="none"><rect x="3" y="3" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M11 3v8a1 1 0 01-1 1H3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>'; }, 2000);
                  });
                });
              })(botResponse, copyBtn);
              actionsWrapEl.appendChild(copyBtn);
              createQuoteBtn(botResponse, actionsWrapEl);
              createExportBtn(botResponse, actionsWrapEl);
              responseElement.querySelector('.silk-bubble').appendChild(actionsWrapEl);
              conversationMessages.push({ content: botResponse, isUser: false, time: Date.now() });
              saveHistoryEntry();
              // 大篇幅文本自动折叠
              applyContentFold(responseElement, botResponse);
            }
          }
        } catch (e) {
          removeTypingIndicator();
          addMessage('抱歉，请求失败: ' + e.message, false);
          console.error('发送消息失败:', e);
        }
        btnSend.classList.remove('loading');
      }

      function saveHistoryEntry() {
        if (currentHistoryId && historyData[currentHistoryId]) {
          historyData[currentHistoryId].messages = conversationMessages.slice();
          if (historyData[currentHistoryId].messages.length > MAX_MSGS_PER_CONV) {
            historyData[currentHistoryId].messages = historyData[currentHistoryId].messages.slice(-MAX_MSGS_PER_CONV);
          }
          saveHistory();
        }
      }

      function newConversation() {
        conversationMessages = [];
        currentHistoryId = null;
        isLoadedFromHistory = false;
        currentSessionId = null;  // 重置会话 ID，新对话 = 新记忆
        try { localStorage.removeItem('agent-studio-session-id'); } catch (_) {}
        var all = historyItemsWrap.querySelectorAll('.history-item');
        for (var i = 0; i < all.length; i++) all[i].classList.remove('active');
        var chatBody = document.getElementById('chatBody');
        chatBody.innerHTML = '';
        chatBody.classList.remove('has-messages');
        chatBody.appendChild(emptyState);
        emptyState.style.display = 'block';
        // 重新触发空状态入场动画
        emptyState.style.animation = 'none';
        emptyState.offsetHeight; // 强制回流
        emptyState.style.animation = 'fadeUp 0.5s var(--ease)';
        chatInput.value = '';
        chatInput.style.height = 'auto';
        chatBody.scrollTop = 0;
        chatInput.focus();
      }

      document.getElementById('btnNewChat').addEventListener('click', newConversation);
    })();
  </script>
</body>
</html>
